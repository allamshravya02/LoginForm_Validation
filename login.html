<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-box {
      width: 320px;
      padding: 24px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    .login-box h1 {
      margin: 0 0 18px;
      font-size: 1.4rem;
      text-align: center;
    }

    .login-box label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 14px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 1rem;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    .login-box .error {
      color: #d93025;
      font-size: 0.9rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Login</h1>
    <form id="loginForm" novalidate>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Password" required minlength="6" />

      <button type="submit">Sign In</button>
      <div id="errorMessage" class="error" aria-live="polite"></div>
    </form>
  </div>

  ```html
<script>
  const form = document.getElementById('loginForm');
  const errorMessage = document.getElementById('errorMessage');

  form.addEventListener('submit', function (event) {
    event.preventDefault();

    errorMessage.innerHTML = '';

    const email = form.email.value.trim();
    const password = form.password.value.trim();

    let errors = [];

    // Email Validation
    if (email === '') {
      errors.push('Email is required.');
    } 
    else if (!form.email.checkValidity()) {
      errors.push('Enter a valid email address.');
    }

    // Optional domain check
    if (email && !email.endsWith('@gmail.com')) {
      errors.push('Only Gmail accounts are allowed.');
    }

    // Password Validation
    if (password === '') {
      errors.push('Password is required.');
    }

    // Minimum length
    if (password.length < 8) {
      errors.push('Password must be at least 8 characters.');
    }

    // Uppercase letter
    if (!/[A-Z]/.test(password)) {
      errors.push('Password must contain at least one uppercase letter.');
    }

    // Lowercase letter
    if (!/[a-z]/.test(password)) {
      errors.push('Password must contain at least one lowercase letter.');
    }

    // Number check
    if (!/[0-9]/.test(password)) {
      errors.push('Password must contain at least one number.');
    }

    // Special character check
    if (!/[!@#$%^&*]/.test(password)) {
      errors.push('Password must contain at least one special character.');
    }

    // No spaces allowed
    if (/\s/.test(password)) {
      errors.push('Password should not contain spaces.');
    }

    // Display Errors
    if (errors.length > 0) {
      errorMessage.innerHTML = errors.join('<br>');
      return;
    }

    alert('Login Successful!');
    form.reset();
  });
</script>
